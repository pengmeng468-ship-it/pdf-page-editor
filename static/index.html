<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF Editor-lite</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">PDF</div>
          <div>
            <h1>PDF Editor-lite</h1>
            <p id="doc-count">未添加文件</p>
          </div>
        </div>
        <button id="add-files" class="primary">添加 PDF</button>

        <div class="side-section">
          <div class="side-label">PPT 转 PDF</div>
          <select id="ppt-nup" aria-label="PPT 多页合一">
            <option value="1">不合并</option>
            <option value="2">2合1</option>
            <option value="4">4合1</option>
            <option value="6">6合1</option>
            <option value="8">8合1</option>
          </select>
          <select id="ppt-order" aria-label="PPT 合并排列方向">
            <option value="row">从左到右</option>
            <option value="column">从上到下</option>
          </select>
          <button id="ppt-add" class="secondary">PPT转PDF并编辑</button>
          <button id="ppt-save" class="secondary">PPT转PDF保存</button>
          <div class="side-hint">导入多个 PPT 后，先在左侧选中文件；调整合并方式或排列方向会自动刷新。</div>
        </div>

        <div class="side-section">
          <div class="side-label">Word 转 PDF</div>
          <button id="word-add" class="secondary">Word转PDF并编辑</button>
          <button id="word-save" class="secondary">Word转PDF保存</button>
        </div>

        <div id="file-list" class="file-list"></div>
      </aside>

      <main class="workspace">
        <header class="toolbar">
          <div class="tool-group">
            <button id="rotate-left" title="左转 90°">↶</button>
            <button id="rotate-right" title="右转 90°">↷</button>
            <button id="delete-pages" title="删除选中页">删除</button>
          </div>
          <div class="tool-group">
            <button id="select-all">全选</button>
            <button id="clear-select">取消选择</button>
          </div>
          <div class="tool-group grow">
            <input id="split-ranges" placeholder="拆分范围，如 1-3,8,10-12" />
            <button id="split-btn">拆分</button>
          </div>
          <button id="export-btn" class="primary">导出 PDF</button>
        </header>

        <section id="empty-state" class="empty-state">
          <h2>添加 PDF 或转换 Office 文件后开始处理</h2>
          <p>可合并多个文件、拖拽重排页面、删除页面、旋转页面，并导出为新 PDF。</p>
        </section>

        <section id="page-grid" class="page-grid" aria-label="PDF 页面"></section>
      </main>
    </div>

    <div id="busy-overlay" class="busy-overlay" hidden>
      <div class="busy-panel">
        <div class="spinner" aria-hidden="true"></div>
        <div id="busy-title">正在处理</div>
        <p id="busy-detail">请稍候...</p>
      </div>
    </div>
    <div id="toast" class="toast" hidden></div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
